# Monitors
monitor = desc:BOE 0x09B4 , 1920x1080@60 , 0x0 , 1
monitor = , prefered , auto , 1 , mirror , desc:BOE 0x09B4

# Autostart
#systemctl --user enable --now waybar.service
#systemctl --user enable --now hyprpaper.service
#systemctl --user enable --now hypridle.service
#systemctl --user enable --now hyprpolkitagent.service

# Bindings
$mod = SUPER
$shiftMod = SUPER SHIFT
$ctrlMod = SUPER CTRL
$launcher = rofi -show drun -run-command "uwsm app -- {cmd}"
$terminal = uwsm app -- kitty
$fileManager = uwsm app -- thunar
$browser = uwsm app -- firefox
$lockscreen = uwsm app -- hyprlock

bindr = $mod, SUPER_L, exec, pkill rofi || $launcher
bind = $mod, Q, killactive,
bindr = $shiftMod, w, exec, systemctl --user restart waybar.service
# bind = $mod, M, exec, uwsm stop
bindr = $mod, RETURN, exec, $terminal
bind = $mod, L, exec, $lockscreen
bind = $mod, F, exec, $browser
bind = $mod, V, togglefloating,
bind = $mod, P, pseudo, # dwindle
bind = $mod, J, togglesplit, # dwindle
# FileExplorer
bindr = $mod, E, exec, $fileManager
# Screenshots
bind = , PRINT, exec, hyprshot --mode output # Screenshot a monitor
bind = $mod, PRINT, exec, hyprshot --mode window --freeze # Screenshot a window
bind = $ctrlMod, PRINT, exec, hyprshot --mode region --freeze # Screenshot a region
# Colour Picker
bind = $shiftMod, C, exec, hyprpicker --autocopy
# Switch Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, code:87, workspace, 1 # Numpad
bind = $mod, code:88, workspace, 2
bind = $mod, code:89, workspace, 3
bind = $mod, code:83, workspace, 4
bind = $mod, code:84, workspace, 5
bind = $mod, code:85, workspace, 6
bind = $mod, code:79, workspace, 7
bind = $mod, code:80, workspace, 8
bind = $mod, code:81, workspace, 9
bind = $mod, code:90, workspace, 10
# Moving Workspaces
bind = $shiftMod, 1, movetoworkspace, 1
bind = $shiftMod, 2, movetoworkspace, 2
bind = $shiftMod, 3, movetoworkspace, 3
bind = $shiftMod, 4, movetoworkspace, 4
bind = $shiftMod, 5, movetoworkspace, 5
bind = $shiftMod, 6, movetoworkspace, 6
bind = $shiftMod, 7, movetoworkspace, 7
bind = $shiftMod, 8, movetoworkspace, 8
bind = $shiftMod, 9, movetoworkspace, 9
bind = $shiftMod, 0, movetoworkspace, 10
bind = $shiftMod, code:87, movetoworkspace, 1 # Numpad
bind = $shiftMod, code:88, movetoworkspace, 2
bind = $shiftMod, code:89, movetoworkspace, 3
bind = $shiftMod, code:83, movetoworkspace, 4
bind = $shiftMod, code:84, movetoworkspace, 5
bind = $shiftMod, code:85, movetoworkspace, 6
bind = $shiftMod, code:79, movetoworkspace, 7
bind = $shiftMod, code:80, movetoworkspace, 8
bind = $shiftMod, code:81, movetoworkspace, 9
bind = $shiftMod, code:90, movetoworkspace, 10
# To switch between windows in a floating workspace:
bind = SUPER, Tab, cyclenext         # Change focus to another window
bind = SUPER, Tab, bringactivetotop  # Bring it to the top
# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
# Example special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace, magic
bind = $shiftMod, S, movetoworkspace, special:magic
# Move focus with mod + arrow keys
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.00 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume -l 1.00 @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-
# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
# Gestures
gesture = 3, horizontal, workspace
gesture = 3, pinch, scale: 1.5, float

# Look & Feel
general {
    layout = dwindle
    border_size = 0
    gaps_in = 2
    gaps_out = 0
    gaps_workspaces = 0
    no_border_on_floating = true

    no_focus_fallback = false

    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true

    allow_tearing = false

    snap {
        enabled = false
    }
}
decoration {
	rounding = 0
	active_opacity = 1.0
	inactive_opacity = 1.0
	fullscreen_opacity = 1.0

	dim_inactive = false
	blur {
		enabled = false
	}
	shadow {
		enabled = false
	}
}
animations {
  enabled = false
}
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mod + P in the keybinds section
    force_split = 0
    preserve_split = true
    smart_split = false
    smart_resizing = true
    permanent_direction_override = false
    special_scale_factor = 1
    split_width_multiplier = 1.0
    use_active_for_splits = true
    default_split_ratio = 1.0
    split_bias = 0

    #pseudo
    #togglesplit
    #swapsplit
    #preselect
    #movetoroot
}
master {
    new_status = master
    #
}
input {
    kb_layout = us

    numlock_by_default = true

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    scroll_method = on_button_down
    scroll_button = 274

    touchpad {
    }
    touchdevice {
        enabled = true
    }
    tablet {
    }
}

group {
    #
    groupbar {
        #
    }
}
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = false
    font_family = NotoMonoNF
    disable_splash_rendering = false
    col.splash = rgba(ffffffff)
    splash_font_family = NotoMonoNF

    vfr = true
    vrr = 0
    mouse_move_enables_dpms = false
    key_press_enables_dpms = false

    always_follow_on_dnd = false
    layers_hog_keyboard_focus = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    disable_autoreload = false
    enable_swallow = false
    swallow_regex =
    swallow_exception_regex =
    focus_on_activate = false
    mouse_move_focuses_monitor = true
    allow_session_lock_restore = false
    close_special_on_empty = true
    new_window_takes_over_fullscreen = 0
    exit_window_retains_fullscreen = false
    initial_workspace_tracking = 1
    render_unfocused_fps = 15
    lockdead_screen_delay = 1000
    disable_xdg_env_checks = false

    middle_click_paste = false
}
binds{
}
xwayland{
    enabled = true
    use_nearest_neighbor = true
    force_zero_scaling = true
}
opengl{
    nvidia_anti_flicker = true
}
render{
}
cursor{
}
ecosystem{
    no_update_news = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

windowrule = float, class:imv
windowrule = center, class:imv

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrulev2 = noinitialfocus,xwayland:1
